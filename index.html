<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Dynamic To-Do List</h1>
    <p class="description">
        A simple interactive to-do list application that allows users to add,
        edit, delete, and mark tasks as completed.
    </p>

    <div class="input-section">
        <input type="text" id="taskInput" placeholder="Enter your task here...">
        <button id="addBtn">Add Task</button>
    </div>

    <ul id="taskList"></ul>

    <div class="task-stats">
        <span id="pendingCount">Pending: 0</span>
        <span id="completedCount">Completed: 0</span>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
